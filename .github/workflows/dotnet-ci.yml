name: .NET CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: dotnet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ["9.0.x"]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ runner.temp }}\nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true

      - name: Restore
        run: dotnet restore ChildGuard.sln

      - name: Build (Release)
        run: dotnet build ChildGuard.sln -c Release --no-restore

      - name: Test (Release)
        run: >-
          dotnet test ChildGuard.sln -c Release --no-build
          --logger "trx;LogFileName=TestResults.trx" -m:1
          --results-directory TestResults
          --collect "XPlat Code Coverage"

      - name: Generate HTML Coverage
        if: always()
        shell: pwsh
        run: |
          ./scripts/report_coverage.ps1 -ResultsDir "TestResults" -ReportDir "CoverageReport"

      - name: Upload Coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.dotnet-version }}
          path: CoverageReport
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: |
            **/TestResults/*.trx
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

