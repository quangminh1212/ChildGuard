name: .NET CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: dotnet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ["9.0.x"]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ runner.temp }}\nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true

      - name: Restore
        run: dotnet restore ChildGuard.sln

      - name: Build (Release)
        run: dotnet build ChildGuard.sln -c Release --no-restore

      - name: Test (Release)
        run: >-
          dotnet test ChildGuard.sln -c Release --no-build
          --logger "trx;LogFileName=TestResults.trx" -m:1
          --results-directory TestResults
          --collect "XPlat Code Coverage"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Exclude="[xunit.*]*;[*.Tests]*"

      - name: Generate HTML Coverage
        if: always()
        shell: pwsh
        run: |
          ./scripts/report_coverage.ps1 -ResultsDir "TestResults" -ReportDir "CoverageReport"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: |
            **/TestResults/*.trx
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.dotnet-version }}
          path: CoverageReport
          if-no-files-found: warn
          retention-days: 7

  enforce-coverage:
    needs: build-and-test
    runs-on: windows-latest
    env:
      MIN_COVERAGE: '70'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          # Use a fixed name (single matrix entry). If later we test multiple versions, switch to a matrix here too.
          name: test-results-9.0.x
          path: TestResults

      - name: Check minimum coverage threshold
        shell: pwsh
        run: |
          $cov = Get-ChildItem -Recurse -Filter coverage.cobertura.xml -Path TestResults | Select-Object -First 1
          if (-not $cov) { Write-Error "coverage.cobertura.xml not found"; exit 1 }
          [xml]$doc = Get-Content $cov.FullName
          $lineRate = [double]$doc.coverage."line-rate"
          $pct = [math]::Round($lineRate * 100, 2)
          $min = [double]$env:MIN_COVERAGE
          Write-Host "Line coverage: $pct% (min required: $min%)"
          if ($pct -lt $min) {
            Write-Error "Coverage $pct% is below threshold $min%"
            exit 2
          }
          Write-Host "Coverage OK (>= $min%)"

  ci-success:
    needs: [build-and-test, enforce-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All checks passed"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-9.0.x
          path: |
            **/TestResults/*.trx
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

